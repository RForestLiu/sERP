                            <button class="collect-btn-save-product" id="collect-save-btn-${t.task_id}" onclick="saveAsProduct('${t.task_id}')">💾 保存为正式产品</button>
                        </div>
                    `;
                    collectCardsContainer.appendChild(card);
                });
            } catch (e) {
                console.error("恢复采集任务失败:", e);
            }
        }

        // ---------- 初始化 ----------
        (async function init() {
            await renderTaskList();
            const tasks = await fetchTasks();
            if (tasks.length > 0) {
                await switchTask(tasks[0].id);
            }
            // 恢复历史采集任务
            await restoreCollectTasks();
        })();

        // 页面关闭或刷新时尝试保存
        window.addEventListener("beforeunload", () => {
            if (currentTaskId) {
                taskData.text1 = text1El.value;
                navigator.sendBeacon(`/api/tasks/${currentTaskId}`, JSON.stringify({ data: taskData }));
            }
        });

        // ==================== 采集产品模块 ====================

        // 采集任务状态
        const collectTasks = {};  // task_id -> {cardEl, pollTimer}

        const collectUrlInput = document.getElementById("collect-url");
        const collectStartBtn = document.getElementById("collect-start-btn");
        const collectCardsContainer = document.getElementById("collect-cards-container");
        const collectPlaceholder = document.getElementById("collect-placeholder");

        // 数据查看弹窗
        const dataModalOverlay = document.getElementById("data-modal-overlay");
        const dataModalClose = document.getElementById("data-modal-close");
        const dataModalTitle = document.getElementById("data-modal-title");
        const dataModalContent = document.getElementById("data-modal-content");
        const dataModalTabs = document.querySelectorAll(".data-modal-tab");
        let currentModalTaskId = null;
        let currentModalTab = "product";

        // 弹窗关闭
        dataModalClose.addEventListener("click", () => {
            dataModalOverlay.classList.remove("active");
        });
        dataModalOverlay.addEventListener("click", (e) => {
            if (e.target === dataModalOverlay) {
                dataModalOverlay.classList.remove("active");
            }
        });

        // 弹窗标签切换
        dataModalTabs.forEach(tab => {
            tab.addEventListener("click", async () => {
                dataModalTabs.forEach(t => t.classList.remove("active"));
                tab.classList.add("active");
                currentModalTab = tab.dataset.tab;
                await loadModalData(currentModalTaskId, currentModalTab);
            });
        });

        async function loadModalData(taskId, tab) {
            try {
                const res = await fetch(`/api/collect/${taskId}/result`);
                if (!res.ok) {
                    dataModalContent.textContent = "数据加载失败";
                    return;
                }
                const data = await res.json();
                if (tab === "product") {
                    dataModalTitle.textContent = "产品数据";
                    dataModalContent.textContent = JSON.stringify(data.product_data || {}, null, 2);
                } else {
                    dataModalTitle.textContent = "图片映射表";
                    dataModalContent.textContent = JSON.stringify(data.images_mapping || [], null, 2);
                }
            } catch (e) {
                dataModalContent.textContent = "加载出错: " + e.message;
            }
        }

        function showDataModal(taskId) {
            currentModalTaskId = taskId;
            dataModalOverlay.classList.add("active");
            loadModalData(taskId, currentModalTab);
        }

        // 创建采集卡片
        function createCollectCard(taskId, url) {
            const card = document.createElement("div");
            card.className = "collect-card";
            card.dataset.taskId = taskId;
            card.innerHTML = `
                <div class="collect-card-header">
                    <div class="collect-card-title" id="collect-title-${taskId}">正在采集...</div>
                    <button class="collect-btn-delete" onclick="deleteCollectCard('${taskId}')">✕ 删除</button>
                </div>
                <div class="collect-card-url">${url}</div>
                <div class="collect-card-status pending" id="collect-status-${taskId}">
                    <span class="collect-status-spinner"></span>
                    <span id="collect-msg-${taskId}">等待开始...</span>
                </div>
                <div class="collect-card-progress" id="collect-progress-${taskId}">
                    <div class="collect-card-progress-bar" id="collect-progress-bar-${taskId}" style="width: 0%"></div>
                </div>
                <div class="collect-card-result" id="collect-result-${taskId}" style="display:none"></div>
                <div class="collect-card-actions" id="collect-actions-${taskId}" style="display:none">
                    <button class="collect-btn-open-folder" onclick="openCollectFolder('${taskId}')">📂 打开文件夹</button>
                    <button class="collect-btn-view-data" onclick="showDataModal('${taskId}')">📋 查看数据</button>
                    <button class="collect-btn-save-product" id="collect-save-btn-${taskId}" onclick="saveAsProduct('${taskId}')">💾 保存为正式产品</button>
                </div>
            `;
            collectCardsContainer.appendChild(card);
            return card;
        }

        // 更新采集卡片状态
        function updateCollectCard(taskId, status, progress, message) {
            const statusEl = document.getElementById(`collect-status-${taskId}`);
            const msgEl = document.getElementById(`collect-msg-${taskId}`);
            const progressBar = document.getElementById(`collect-progress-bar-${taskId}`);
            const resultEl = document.getElementById(`collect-result-${taskId}`);
            const actionsEl = document.getElementById(`collect-actions-${taskId}`);
            const titleEl = document.getElementById(`collect-title-${taskId}`);

            if (!statusEl) return;

            // 更新状态样式
            statusEl.className = "collect-card-status " + status;
            
            // 更新进度条
            if (progressBar) {
                progressBar.style.width = progress + "%";
                progressBar.className = "collect-card-progress-bar";
                if (status === "completed") progressBar.classList.add("completed");
                if (status === "error") progressBar.classList.add("error");
            }

            if (status === "pending" || status === "crawling" || status === "classifying" || 
                status === "downloading" || status === "saving") {
                statusEl.innerHTML = `<span class="collect-status-spinner"></span><span>${message}</span>`;
            } else if (status === "completed") {
                statusEl.innerHTML = `✅ ${message}`;
                // 显示结果区域
                if (resultEl) {
                    resultEl.style.display = "grid";
                    // 从 collectTasks 中获取结果
                    const taskInfo = collectTasks[taskId];
                    if (taskInfo && taskInfo.result) {
                        const r = taskInfo.result;
                        resultEl.innerHTML = `
                            <div class="collect-result-item">📄 标题: <span>${r.title || '未知'}</span></div>
                            <div class="collect-result-item">🏷️ 平台: <span>${r.platform || '未知'}</span></div>
                            <div class="collect-result-item">🖼️ 图片: <span>${r.downloaded || 0}/${r.image_count || 0} 张已下载</span></div>
                            <div class="collect-result-item">❌ 失败: <span>${r.failed || 0} 张</span></div>
                        `;
                    }
                    if (titleEl) titleEl.textContent = message;
                }
                if (actionsEl) actionsEl.style.display = "flex";
            } else if (status === "error") {
                statusEl.innerHTML = `❌ ${message}`;
                if (titleEl) titleEl.textContent = "采集失败";
            }
        }

        // 删除采集卡片（含后端数据和文件夹）
        window.deleteCollectCard = async function(taskId) {
            if (!confirm("确定要删除这个采集任务吗？此操作将同时删除所有已下载的图片数据。")) return;
            
            try {
                const res = await fetch(`/api/collect/${taskId}`, {
                    method: "DELETE"
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || "删除失败");
                }
                
                // 从 DOM 移除卡片
                const card = document.querySelector(`.collect-card[data-task-id="${taskId}"]`);
                if (card) card.remove();
                
                // 停止轮询
                if (collectTasks[taskId] && collectTasks[taskId].pollTimer) {
                    clearInterval(collectTasks[taskId].pollTimer);
                }
                delete collectTasks[taskId];
                
                // 检查是否还有卡片
                if (collectCardsContainer.children.length === 0) {
                    collectPlaceholder.style.display = "block";
                }
                
                showMsg("✅ 采集任务已删除（含图片数据）");
            } catch (e) {
                showMsg("❌ 删除失败: " + e.message, true);
            }
        };

        // 打开采集文件夹
        window.openCollectFolder = async function(taskId) {
            try {
                await fetch(`/api/collect/${taskId}/open_folder`, { method: "POST" });
                showMsg("已打开采集数据文件夹");
            } catch (e) {
                showMsg("无法打开文件夹", true);
            }
        };

        // 轮询采集状态
        function startPolling(taskId) {
            if (collectTasks[taskId] && collectTasks[taskId].pollTimer) {
                clearInterval(collectTasks[taskId].pollTimer);
            }
            
            const pollTimer = setInterval(async () => {
                try {
                    const res = await fetch(`/api/collect/${taskId}/status`);
                    if (!res.ok) {
                        clearInterval(pollTimer);
                        return;
                    }
                    const data = await res.json();
                    
                    // 保存结果到 collectTasks
                    if (!collectTasks[taskId]) collectTasks[taskId] = {};
                    collectTasks[taskId].result = data.result;
                    
                    updateCollectCard(taskId, data.status, data.progress || 0, data.message);
                    
                    // 如果任务已完成或出错，停止轮询
                    if (data.status === "completed" || data.status === "error") {
                        clearInterval(pollTimer);
                        if (collectTasks[taskId]) {
                            collectTasks[taskId].pollTimer = null;
                        }
                    }
                } catch (e) {
                    console.error("轮询失败:", e);
                }
            }, 2000);  // 每2秒轮询一次
            
            if (!collectTasks[taskId]) collectTasks[taskId] = {};
            collectTasks[taskId].pollTimer = pollTimer;
        }

        // 开始采集
        collectStartBtn.addEventListener("click", async () => {
            const url = collectUrlInput.value.trim();
            if (!url) {
                showMsg("请输入采集网址！", true);
                return;
            }
            if (!url.startsWith("http://") && !url.startsWith("https://")) {
                showMsg("请输入有效的网址（以 http:// 或 https:// 开头）", true);
                return;
            }

            // 禁用按钮，防止重复点击
            collectStartBtn.disabled = true;
            collectStartBtn.textContent = "采集中...";

            try {
                const res = await fetch("/api/collect", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url })
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || "启动采集失败");
                }
                
                const data = await res.json();
                const taskId = data.task_id;
                
                // 隐藏占位符
                collectPlaceholder.style.display = "none";
                
                // 创建卡片
                createCollectCard(taskId, url);
                
                // 开始轮询
                startPolling(taskId);
                
                showMsg("采集任务已启动！");
                
            } catch (e) {
                showMsg("启动采集失败: " + e.message, true);
            } finally {
                collectStartBtn.disabled = false;
                collectStartBtn.textContent = "开始采集";
            }
        });

        // 回车键触发采集
        collectUrlInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                collectStartBtn.click();
            }
        });

        // ==================== 保存为正式产品 ====================

        // 保存为正式产品
        window.saveAsProduct = async function(taskId) {
            const btn = document.getElementById(`collect-save-btn-${taskId}`);
            if (!btn) return;
            
            // 如果已保存，不做任何操作
            if (btn.classList.contains("saved")) return;
            
            // 确认
            if (!confirm("确定要将此采集数据保存为正式产品吗？系统将自动分配 SKC/SKU 编码。")) return;
            
            btn.disabled = true;
            btn.classList.add("saving");
            btn.textContent = "⏳ 保存中...";
            
            try {
                const res = await fetch(`/api/collect/${taskId}/save_product`, {
                    method: "POST"
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || "保存失败");
                }
                
                const data = await res.json();
                
                // 更新按钮状态为已保存
                btn.classList.remove("saving");
                btn.classList.add("saved");
                btn.textContent = `✅ 已保存 (${data.skc})`;
                btn.disabled = false;
                
                showMsg(`✅ 产品已保存为 ${data.skc}，共 ${data.skus.length} 个 SKU`);
            } catch (e) {
                btn.classList.remove("saving");
                btn.disabled = false;
                btn.textContent = "💾 保存为正式产品";
                showMsg("❌ 保存失败: " + e.message, true);
            }
        };

        // 检查采集任务是否已保存为正式产品（恢复历史任务时调用）
        async function checkProductStatus(taskId) {
            try {
                const res = await fetch(`/api/collect/${taskId}/product_status`);
                if (!res.ok) return;
                const data = await res.json();
                if (data.saved) {
                    const btn = document.getElementById(`collect-save-btn-${taskId}`);
                    if (btn) {
                        btn.classList.add("saved");
                        btn.textContent = `✅ 已保存 (${data.skc})`;
                        btn.disabled = false;
                    }
                }
            } catch (e) {
                console.error("检查产品状态失败:", e);
            }
        }

        // 重写 restoreCollectTasks，在恢复后检查保存状态
        const _originalRestore = restoreCollectTasks;
        restoreCollectTasks = async function() {
            await _originalRestore.call(this);
            // 检查每个已完成任务的保存状态
            document.querySelectorAll(".collect-card[data-task-id]").forEach(card => {
                const taskId = card.dataset.taskId;
                checkProductStatus(taskId);
            });
        };

        // 重写 updateCollectCard，在完成时也检查保存状态
        const _originalUpdate = updateCollectCard;
        updateCollectCard = function(taskId, status, progress, message) {
            _originalUpdate.call(this, taskId, status, progress, message);
            if (status === "completed") {
                // 延迟一点检查保存状态，确保按钮已渲染
                setTimeout(() => checkProductStatus(taskId), 500);
            }
        };

        // ==================== 产品管理模块 ====================

        const productCardsContainer = document.getElementById("product-cards-container");
        const productEmpty = document.getElementById("product-empty");

        // 加载产品列表
        async function loadProducts() {
            try {
                const res = await fetch("/api/products");
                if (!res.ok) return;
                const data = await res.json();
                renderProducts(data.products, data.stores);
            } catch (e) {
                console.error("加载产品列表失败:", e);
            }
        }

        // 渲染产品卡片（单列布局 + 画中画 + 大模型识别）
        function renderProducts(products, stores) {
            productCardsContainer.innerHTML = "";
            
            if (!products || products.length === 0) {
                productEmpty.style.display = "flex";
                return;
            }
            productEmpty.style.display = "none";

            // 按创建时间倒序排列
            products.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            products.forEach(p => {
                const card = document.createElement("div");
                card.className = "product-card";
                card.dataset.skc = p.skc;

                const pd = p.product_data || {};
                const attrs = pd.attributes || {};
                const manual = p.manual_data || {};
                const storeStatus = p.store_status || {};

                // 从采集数据中提取信息
                function extractFromText(text, patterns) {
                    if (!text) return "";
                    for (const ptn of patterns) {
                        const m = text.match(ptn);
                        if (m) return m[0].trim();
                    }
                    return "";
                }
                const searchText = (pd.about_item || "") + " " + (pd.product_description || "") + " " + (pd.description || "");

                // 重量
                let collectedWeight = attrs.weight || attrs.重量 || "";
                if (!collectedWeight) {
                    collectedWeight = extractFromText(searchText, [
                        /\d+\.?\d*\s*(?:g|克|kg|千克|公斤)/i,
                        /重量[：:]\s*\d+\.?\d*\s*(?:g|克|kg|千克|公斤)/i,
                    ]);
                }

                // 尺寸
                let collectedSize = attrs.size || attrs.尺寸 || attrs.dimensions || "";
                if (!collectedSize) {
                    collectedSize = extractFromText(searchText, [
                        /\d+\.?\d*\s*[×xX*]\s*\d+\.?\d*\s*[×xX*]\s*\d+\.?\d*\s*(?:cm|厘米|mm|毫米)?/i,
                        /\d+\.?\d*\s*[×xX*]\s*\d+\.?\d*\s*(?:cm|厘米|mm|毫米)?/i,
                        /尺寸[：:]\s*[\d\.\s×xX*cm厘米mm毫米]+/i,
                    ]);
                }

                // 格式化时间
                const createdDate = p.created_at ? new Date(p.created_at).toLocaleString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" }) : "";

                // 构建店铺矩阵
                let matrixCells = "";
                stores.forEach(s => {
                    const status = storeStatus[s.id] || "未上架";
                    matrixCells += `
                        <div class="matrix-cell" data-skc="${p.skc}" data-store-id="${s.id}">
                            <span class="store-name">${s.name}</span>
                            <span class="store-status status-${status}">${status}</span>
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div class="product-card-header">
                        <div class="skc-row">
                            <span class="skc-badge">${p.skc}</span>
                            <span class="category-tag">${p.category || '其他'}</span>
                        </div>
                        <div class="product-title">${p.title || '未命名产品'}</div>
                        <div class="product-meta">
                            <span>📎 ${p.platform || '未知平台'}</span>
                            <span>💰 ${p.price || '—'}</span>
                            <span>🕐 ${createdDate}</span>
                            <span>📦 ${(p.skus || []).length} SKU</span>
                        </div>
                    </div>
                    <div class="product-card-body">
                        <!-- 画中画触发条 -->
                        <div class="collected-pip-trigger" data-skc="${p.skc}">
                            <span class="pip-icon">📖</span>
                            <span class="pip-label">采集原始数据</span>
                            <span class="pip-hint">悬停查看</span>
                        </div>
                        <!-- 粘贴文本框 + 识别按钮 -->
                        <div class="paste-extract-area">
                            <textarea class="paste-textarea" placeholder="粘贴产品描述文本，点击下方按钮用 AI 自动识别并转换为国际单位..."></textarea>
                            <button class="paste-extract-btn" data-skc="${p.skc}">🤖 AI 识别并填充</button>
                        </div>
                        <!-- 人工登记字段 -->
                        <div class="product-info-row manual">
                            <span class="row-label">重量(g)</span>
                            <input type="text" class="manual-input" data-field="weight_g" value="${manual.weight_g || ''}" placeholder="克">
                        </div>
                        <div class="product-info-row manual">
                            <span class="row-label">尺寸规格</span>
                            <input type="text" class="manual-input" data-field="size_spec" value="${manual.size_spec || ''}" placeholder="如 20×10×3cm">
                        </div>
                        <div class="product-info-row manual">
                            <span class="row-label">规格</span>
                            <input type="text" class="manual-input" data-field="spec" value="${manual.spec || ''}" placeholder="如 大号/黑色">
                        </div>
                        <div class="product-info-row manual">
                            <button class="save-manual-btn" data-skc="${p.skc}">💾 保存人工数据</button>
                        </div>
                    </div>
                    <div class="product-store-matrix">
                        <div class="matrix-title">🏪 产品店铺矩阵</div>
                        <div class="matrix-grid">
                            ${matrixCells}
                        </div>
                    </div>
                `;

                productCardsContainer.appendChild(card);
            });

            // ===== 画中画悬浮窗逻辑（下方展开 + 边界检测） =====
            // 创建全局画中画浮动卡片
            let pipFloat = document.getElementById("pip-float-global");
            if (!pipFloat) {
                pipFloat = document.createElement("div");
                pipFloat.id = "pip-float-global";
                pipFloat.className = "collected-pip-float";
                pipFloat.style.pointerEvents = "auto"; // 允许鼠标交互
                document.body.appendChild(pipFloat);
            }

            let pipHideTimer = null;

            function showPipFloat(triggerEl, weight, size) {
                const rect = triggerEl.getBoundingClientRect();
                const pipW = 240; // 漂框宽度
                const pipH = 100; // 漂框高度
                
                pipFloat.innerHTML = `
                    <div class="pip-float-title">📖 采集原始数据</div>
                    <div class="pip-float-row">
                        <span class="pip-float-label">📦 重量</span>
                        <span class="pip-float-value">${weight || '—'}</span>
                    </div>
                    <div class="pip-float-row">
                        <span class="pip-float-label">📐 尺寸</span>
                        <span class="pip-float-value">${size || '—'}</span>
                    </div>
                `;
                
                // 先设为显示以获取实际尺寸
                pipFloat.classList.add("show");
                const actualH = pipFloat.offsetHeight || pipH;
                const actualW = pipFloat.offsetWidth || pipW;
                
                // 默认：在触发条正下方，水平居中
                let left = rect.left + (rect.width - actualW) / 2;
                let top = rect.bottom + 6;
                
                // 边界检测：如果下方空间不够，向上展开
                if (top + actualH > window.innerHeight) {
                    top = rect.top - actualH - 6;
                }
                // 如果上方也不够，就放在触发条右侧
                if (top < 0) {
                    top = rect.top;
                    left = rect.right + 8;
                }
                // 如果右侧也不够，放在左侧
                if (left + actualW > window.innerWidth - 10) {
                    left = rect.left - actualW - 8;
                }
                // 如果左侧也不够，强制居中
                if (left < 10) {
                    left = 10;
                }
                // 确保不超出顶部
                if (top < 4) top = 4;
                
                pipFloat.style.left = left + "px";
                pipFloat.style.top = top + "px";
            }

            function hidePipFloat() {
                pipFloat.classList.remove("show");
            }

            // 为每个触发条绑定事件
            document.querySelectorAll(".collected-pip-trigger").forEach(trigger => {
                const skc = trigger.dataset.skc;
                const product = products.find(p => p.skc === skc);
                if (!product) return;
                const pd = product.product_data || {};
                const attrs = pd.attributes || {};
                const searchText = (pd.about_item || "") + " " + (pd.product_description || "") + " " + (pd.description || "");
                
                let collectedWeight = attrs.weight || attrs.重量 || "";
                if (!collectedWeight) {
                    const m = searchText.match(/\d+\.?\d*\s*(?:g|克|kg|千克|公斤)/i);
                    if (m) collectedWeight = m[0].trim();
                }
                let collectedSize = attrs.size || attrs.尺寸 || attrs.dimensions || "";
                if (!collectedSize) {
                    const m = searchText.match(/\d+\.?\d*\s*[×xX*]\s*\d+\.?\d*\s*[×xX*]\s*\d+\.?\d*\s*(?:cm|厘米|mm|毫米)?/i);
                    if (m) collectedSize = m[0].trim();
                }

                trigger.addEventListener("mouseenter", function() {
                    if (pipHideTimer) {
                        clearTimeout(pipHideTimer);
                        pipHideTimer = null;
                    }
                    showPipFloat(this, collectedWeight, collectedSize);
                });
                trigger.addEventListener("mouseleave", function() {
                    pipHideTimer = setTimeout(() => {
                        hidePipFloat();
                    }, 300);
                });
                // 浮动卡片本身也保持显示（防止移入浮动卡片时消失）
                pipFloat.addEventListener("mouseenter", function() {
                    if (pipHideTimer) {
                        clearTimeout(pipHideTimer);
                        pipHideTimer = null;
                    }
                });
                pipFloat.addEventListener("mouseleave", function() {
                    pipHideTimer = setTimeout(() => {
                        hidePipFloat();
                    }, 300);
                });
            });

            // ===== 绑定 AI 识别按钮事件（调用大模型 API） =====
            document.querySelectorAll(".paste-extract-btn").forEach(btn => {
                btn.addEventListener("click", async function() {
                    const skc = this.dataset.skc;
                    const card = this.closest(".product-card");
                    const textarea = card.querySelector(".paste-textarea");
                    const text = textarea.value.trim();
                    
                    if (!text) {
                        showMsg("请先粘贴文本到文本框中！", true);
                        return;
                    }

                    this.disabled = true;
                    this.textContent = "🤖 AI 识别中...";

                    try {
                        const res = await fetch("/api/extract_from_text", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ text })
                        });
                        if (!res.ok) {
                            const err = await res.json();
                            throw new Error(err.error || "识别失败");
                        }
                        const data = await res.json();
                        const extracted = data.extracted;

                        const inputs = card.querySelectorAll(".manual-input");
                        inputs.forEach(inp => {
                            const field = inp.dataset.field;
                            if (extracted[field]) {
                                inp.value = extracted[field];
                            }
                        });

                        const filled = Object.values(extracted).filter(v => v).length;
                        showMsg(`✅ ${skc} AI 识别完成，已填充 ${filled} 个字段（已转换为国际单位）`);
                    } catch (e) {
                        showMsg("❌ AI 识别失败: " + e.message, true);
                    } finally {
                        this.disabled = false;
                        this.textContent = "🤖 AI 识别并填充";
                    }
                });
            });

            // ===== 绑定人工登记保存事件 =====
            document.querySelectorAll(".save-manual-btn").forEach(btn => {
                btn.addEventListener("click", async function() {
                    const skc = this.dataset.skc;
                    const card = this.closest(".product-card");
                    const inputs = card.querySelectorAll(".manual-input");
                    const data = {};
                    inputs.forEach(inp => {
                        data[inp.dataset.field] = inp.value.trim();
                    });

                    this.classList.add("saving");
                    this.textContent = "⏳ 保存中...";
                    this.disabled = true;

                    try {
                        const res = await fetch(`/api/products/${skc}/manual`, {
                            method: "PUT",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(data)
                        });
                        if (!res.ok) throw new Error("保存失败");
                        this.classList.remove("saving");
                        this.classList.add("saved");
                        this.textContent = "✅ 已保存";
                        showMsg(`✅ ${skc} 人工数据已保存`);
                    } catch (e) {
                        this.classList.remove("saving");
                        this.textContent = "💾 保存人工数据";
                        this.disabled = false;
                        showMsg("❌ 保存失败: " + e.message, true);
                    }
                });
            });

            // ===== 绑定店铺矩阵点击事件 =====
            document.querySelectorAll(".matrix-cell").forEach(cell => {
                cell.addEventListener("click", async function() {
                    const skc = this.dataset.skc;
                    const storeId = this.dataset.storeId;
                    const statusEl = this.querySelector(".store-status");
                    const currentStatus = statusEl.textContent;
                    
                    const statuses = ["未上架", "已上架", "下架回归中"];
                    const idx = statuses.indexOf(currentStatus);
                    const nextStatus = statuses[(idx + 1) % statuses.length];

                    try {
                        const res = await fetch(`/api/products/${skc}/store_status`, {
                            method: "PUT",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ store_id: storeId, status: nextStatus })
                        });
                        if (!res.ok) throw new Error("更新失败");
                        
                        statusEl.textContent = nextStatus;
                        statusEl.className = "store-status status-" + nextStatus;
                        showMsg(`✅ ${skc} 在 ${storeId} 状态已更新为「${nextStatus}」`);
                    } catch (e) {
                        showMsg("❌ 更新失败: " + e.message, true);
                    }
                });
            });
        }

        // 切换到产品管理模块时加载数据
        document.querySelector('.nav-item[data-module="product-manage"]').addEventListener("click", () => {
            loadProducts();
        });
    </script>
</body>
</html>
