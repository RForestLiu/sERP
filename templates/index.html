<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Image Edit</title>
<style>
  /* ── Reset & Variables ──────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sidebar-w: 220px;
    --bg:        #0f1117;
    --surface:   #1a1d27;
    --surface2:  #22263a;
    --border:    #2e3352;
    --accent:    #4f6ef7;
    --accent2:   #7c3aed;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --danger:    #ef4444;
    --success:   #22c55e;
    --card-w:    260px;
    --img-size:  220px;
    --radius:    10px;
  }

  html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

  /* ── Layout ─────────────────────────────────────────────── */
  #app { display: flex; height: 100vh; }

  /* ── Sidebar ─────────────────────────────────────────────── */
  #sidebar {
    width: var(--sidebar-w); flex-shrink: 0;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #sidebar-header {
    padding: 14px 12px 10px;
    border-bottom: 1px solid var(--border);
    font-weight: 700; font-size: 14px; letter-spacing: .03em;
    background: linear-gradient(135deg,#1a1d27,#22263a);
  }
  #sidebar-header span { color: var(--accent); }
  #btn-new-task {
    display: block; width: calc(100% - 24px); margin: 10px 12px;
    padding: 8px; background: var(--accent); border: none; border-radius: var(--radius);
    color: #fff; font-size: 12px; font-weight: 600; cursor: pointer;
    transition: background .2s;
  }
  #btn-new-task:hover { background: #3b55e0; }

  #task-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  #task-list::-webkit-scrollbar { width: 4px; }
  #task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .task-item {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 12px; cursor: pointer;
    border-left: 3px solid transparent;
    transition: background .15s, border-color .15s;
    position: relative;
  }
  .task-item:hover { background: var(--surface2); }
  .task-item.active {
    background: rgba(79,110,247,.12);
    border-left-color: var(--accent);
  }
  .task-item .task-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0; transition: background .2s;
  }
  .task-item.active .task-dot { background: var(--accent); }
  .task-name {
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-size: 12px; color: var(--text);
  }
  .task-name-input {
    flex: 1; background: var(--surface); border: 1px solid var(--accent);
    color: var(--text); font-size: 12px; padding: 2px 4px; border-radius: 4px;
    outline: none;
  }
  .task-del {
    opacity: 0; font-size: 11px; color: var(--danger); background: none;
    border: none; cursor: pointer; padding: 2px 4px; border-radius: 4px;
    transition: opacity .2s;
    flex-shrink: 0;
  }
  .task-item:hover .task-del { opacity: 1; }

  /* ── Main Area ───────────────────────────────────────────── */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  #toolbar {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex; align-items: flex-start; gap: 16px;
    flex-shrink: 0;
  }

  /* JSON Input */
  #json-col { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  #json-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
  #json-input {
    width: 100%; height: 96px; resize: none;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-size: 12px; font-family: 'Consolas','Courier New', monospace;
    padding: 8px 10px; outline: none; transition: border-color .2s;
  }
  #json-input:focus { border-color: var(--accent); }
  #btn-split {
    align-self: flex-start; padding: 7px 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: var(--radius); color: #fff;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity .2s;
  }
  #btn-split:hover { opacity: .85; }

  /* ── Batch Drop Zone — always visible ──────────────────────── */
  #drop-col { display: flex; flex-direction: column; gap: 8px; }
  #drop-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
  #drop-zone {
    width: 200px; height: 96px;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; cursor: pointer; transition: border-color .2s, background .2s;
    background: var(--surface2);
    position: relative; overflow: hidden;
  }
  #drop-zone:hover, #drop-zone.dragover {
    border-color: var(--accent);
    background: rgba(79,110,247,.08);
  }
  #drop-zone .dz-icon {
    width: 28px; height: 28px; opacity: .5;
  }
  #drop-zone .dz-text {
    font-size: 11px; color: var(--muted); text-align: center; line-height: 1.5;
    pointer-events: none;
  }
  #drop-zone.dragover .dz-text { color: var(--accent); }
  #drop-file-input { display: none; }

  /* ── Cards Scroll Area ───────────────────────────────────── */
  #cards-area {
    flex: 1; overflow-x: auto; overflow-y: hidden;
    padding: 20px; display: flex; align-items: flex-start; gap: 16px;
  }
  #cards-area::-webkit-scrollbar { height: 6px; }
  #cards-area::-webkit-scrollbar-track { background: transparent; }
  #cards-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Empty hint */
  #empty-hint {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; color: var(--muted); font-size: 13px;
    width: 100%; height: 100%; text-align: center; pointer-events: none;
  }
  #empty-hint svg { opacity: .25; }
  #empty-hint p { line-height: 1.8; }

  /* ── Card ────────────────────────────────────────────────── */
  .card {
    width: var(--card-w); flex-shrink: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: visible;
    display: flex; flex-direction: column; gap: 0;
    transition: box-shadow .2s;
  }
  .card:hover { box-shadow: 0 4px 24px rgba(79,110,247,.15); }

  .card-header {
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 700; color: var(--muted);
    letter-spacing: .04em; text-transform: uppercase;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-header .card-num { color: var(--accent); }

  .card-body { display: flex; flex-direction: column; gap: 10px; padding: 12px; }

  /* ── Image Box (1:1) ─────────────────────────────────────── */
  .img-box {
    width: 100%;
    aspect-ratio: 1 / 1;           /* strict 1:1 */
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface2);
    border: 1.5px dashed var(--border);
    position: relative;
    cursor: pointer;
    transition: border-color .2s;
  }
  .img-box:hover { border-color: var(--accent); }
  .img-box.dragover { border-color: var(--accent); background: rgba(79,110,247,.08); }

  .img-box img {
    width: 100%; height: 100%;
    object-fit: cover;        /* no stretch, centered, max fill */
    object-position: center;
    display: block;
  }

  /* img-box placeholder */
  .img-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; color: var(--muted); font-size: 11px; pointer-events: none;
  }
  .img-placeholder svg { opacity: .4; }

  /* img link wrapper (for right-click open in new tab) */
  .img-link { display: block; width: 100%; height: 100%; }

  /* ── Generate Button ─────────────────────────────────────── */
  .btn-generate {
    width: 100%; padding: 9px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 8px; color: #fff;
    font-size: 12px; font-weight: 700; cursor: pointer;
    position: relative; overflow: hidden; transition: opacity .2s;
  }
  .btn-generate:disabled { opacity: .5; cursor: not-allowed; }
  .btn-generate .btn-label { position: relative; z-index: 1; }

  /* progress bar overlay */
  .btn-generate::after {
    content: '';
    position: absolute; left: -100%; top: 0; width: 100%; height: 100%;
    background: rgba(255,255,255,.15);
    transition: none;
  }
  .btn-generate.loading::after {
    animation: sweep 1.4s ease-in-out infinite;
  }
  @keyframes sweep {
    0%   { left: -100%; }
    100% { left: 100%; }
  }

  /* ── Prompt Textarea ─────────────────────────────────────── */
  .prompt-box {
    width: 100%; height: 76px; resize: none;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-size: 11.5px; padding: 7px 9px; outline: none;
    line-height: 1.6; font-family: inherit;
    transition: border-color .2s;
    overflow-y: auto;
  }
  .prompt-box:focus { border-color: var(--accent); }

  /* ── Result Box Actions ──────────────────────────────────── */
  .result-actions {
    display: flex; gap: 6px;
  }
  .btn-sm {
    flex: 1; padding: 6px 4px;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--surface2); color: var(--text);
    font-size: 11px; cursor: pointer; transition: background .15s, border-color .15s;
  }
  .btn-sm:hover { background: var(--surface); border-color: var(--accent); }
  .btn-sm.danger:hover { border-color: var(--danger); color: var(--danger); }

  /* ── Tooltip Preview ─────────────────────────────────────── */
  #img-tooltip {
    position: fixed; z-index: 9999;
    pointer-events: none; opacity: 0;
    transition: opacity .15s;
    border-radius: 10px; overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,.7);
    border: 1.5px solid var(--border);
    width: 320px; height: 320px;   /* 1:1 preview */
    background: var(--surface);
  }
  #img-tooltip img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center;
    display: block;
  }
  #img-tooltip.visible { opacity: 1; }

  /* ── Scrollbar global ────────────────────────────────────── */
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

  /* ── Status Bar ──────────────────────────────────────────── */
  #status-bar {
    height: 28px; padding: 0 20px;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--muted); flex-shrink: 0;
  }
  #status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
  }
  #status-dot.ok  { background: var(--success); }
  #status-dot.err { background: var(--danger); }
  #status-dot.busy {
    background: var(--accent);
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
</style>
</head>
<body>

<div id="app">

  <!-- ── Sidebar ── -->
  <aside id="sidebar">
    <div id="sidebar-header">AI <span>Image</span> Edit</div>
    <button id="btn-new-task">+ New Task</button>
    <div id="task-list"></div>
  </aside>

  <!-- ── Main ── -->
  <div id="main">

    <!-- Toolbar -->
    <div id="toolbar">

      <!-- JSON input col -->
      <div id="json-col">
        <div id="json-label">JSON Input</div>
        <textarea id="json-input" placeholder='[{"image_name":"a.jpg","prompt":"..."}]'></textarea>
        <button id="btn-split">Split Prompts</button>
      </div>

      <!-- Batch drop zone — always visible -->
      <div id="drop-col">
        <div id="drop-label">Batch Drop Images</div>
        <div id="drop-zone">
          <!-- upload icon -->
          <svg class="dz-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--muted)">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <div class="dz-text">Drop multiple images<br/>or click to select</div>
          <input type="file" id="drop-file-input" multiple accept="image/*" />
        </div>
      </div>

      <!-- Output folder button -->
      <button id="btn-output-folder" class="btn-sm" style="margin-left:auto;align-self:center;">
        📁 Output Folder
      </button>

    </div>

    <!-- Cards scroll area -->
    <div id="cards-area">
      <div id="empty-hint">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p>
          Drop images into the batch zone above<br/>
          or paste JSON and click <strong>Split Prompts</strong>
        </p>
      </div>
    </div>

    <!-- Status bar -->
    <div id="status-bar">
      <div id="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>
  </div>

</div>

<!-- Tooltip preview -->
<div id="img-tooltip"><img id="tooltip-img" src="" alt="" /></div>

<script>
// ================================================================
// State
// ================================================================
let currentTaskId = null;
let cardStates    = [];   // [{ prompt, imageName, uploadUrl, uploadPath, resultUrl }]

// ================================================================
// Utils
// ================================================================
const $ = id => document.getElementById(id);

function setStatus(msg, state='') {
  $('status-text').textContent = msg;
  $('status-dot').className = state ? `ok ${state}` : '';
  if (state === 'busy') $('status-dot').className = 'busy';
  if (state === 'err')  $('status-dot').className = 'err';
  if (state === 'ok')   $('status-dot').className = 'ok';
}

async function api(method, path, body=null, isForm=false) {
  const opts = { method, headers: {} };
  if (body) {
    if (isForm) {
      opts.body = body;
    } else {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
  }
  const res = await fetch(path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

// ================================================================
// Sidebar
// ================================================================
async function loadTaskList() {
  const tasks = await api('GET', '/api/tasks').catch(() => []);
  renderSidebar(tasks);
}

function renderSidebar(tasks) {
  const list = $('task-list');
  list.innerHTML = '';
  tasks.forEach(t => {
    const item = document.createElement('div');
    item.className = 'task-item' + (t.id === currentTaskId ? ' active' : '');
    item.dataset.id = t.id;
    item.innerHTML = `
      <div class="task-dot"></div>
      <div class="task-name" title="${t.name}">${t.name}</div>
      <button class="task-del" title="Delete">x</button>
    `;
    item.querySelector('.task-name').addEventListener('dblclick', e => { e.stopPropagation(); startRename(t.id, item); });
    item.querySelector('.task-del').addEventListener('click', e => { e.stopPropagation(); deleteTask(t.id); });
    item.addEventListener('click', () => switchTask(t.id));
    list.appendChild(item);
  });
}

async function createTask() {
  setStatus('Creating task...', 'busy');
  try {
    const task = await api('POST', '/api/tasks', {});
    currentTaskId = task.id;
    cardStates = task.cards || [];
    $('json-input').value = '';  // 清空json input框
    await loadTaskList();
    renderCards();
    setStatus('Task created', 'ok');
  } catch(e) { setStatus(e.message, 'err'); }
}

async function openOutputFolder() {
  console.log('openOutputFolder clicked, currentTaskId:', currentTaskId);
  if (!currentTaskId) {
    alert('Please select or create a task first');
    return;
  }
  try {
    const result = await api('GET', '/api/tasks/' + currentTaskId + '/open_folder');
    console.log('API result:', result);
  } catch(e) {
    console.error('API error:', e);
    alert('Error: ' + e.message);
  }
}

async function deleteTask(id) {
  if (!confirm('Delete this task and all its files?')) return;
  await api('DELETE', `/api/tasks/${id}`).catch(()=>{});
  if (id === currentTaskId) {
    currentTaskId = null;
    cardStates = [];
    renderCards();
  }
  loadTaskList();
}

async function switchTask(id) {
  if (id === currentTaskId) return;
  await saveCurrentTask();
  const task = await api('GET', `/api/tasks/${id}`).catch(()=>null);
  if (!task) return;
  currentTaskId = task.id;
  cardStates    = task.cards || [];
  $('json-input').value = task.json_input || '';
  renderCards();
  await loadTaskList();
}

function startRename(id, item) {
  const nameEl = item.querySelector('.task-name');
  const old = nameEl.textContent;
  const input = document.createElement('input');
  input.className = 'task-name-input';
  input.value = old;
  nameEl.replaceWith(input);
  input.focus(); input.select();
  const done = async () => {
    const newName = input.value.trim() || old;
    input.replaceWith(nameEl);
    nameEl.textContent = newName;
    await api('PATCH', `/api/tasks/${id}`, { name: newName }).catch(()=>{});
    loadTaskList();
  };
  input.addEventListener('blur', done);
  input.addEventListener('keydown', e => { if (e.key==='Enter') input.blur(); if (e.key==='Escape') { input.value=old; input.blur(); } });
}

// ================================================================
// Save current task state
// ================================================================
let saveTimer = null;
function saveCardsDebounced() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveCurrentTask, 800);
}

async function saveCurrentTask() {
  if (!currentTaskId) return;
  await api('PATCH', `/api/tasks/${currentTaskId}`, {
    json_input: $('json-input').value,
    cards: cardStates,
  }).catch(()=>{});
}

// ================================================================
// Split Prompts
// ================================================================
$('btn-split').addEventListener('click', () => {
  const raw = $('json-input').value.trim();
  if (!raw) { setStatus('JSON input is empty', 'err'); return; }
  let items;
  try { items = JSON.parse(raw); } catch(e) { setStatus('JSON parse error: ' + e.message, 'err'); return; }
  if (!Array.isArray(items)) { setStatus('JSON must be an array', 'err'); return; }

  // 检查是否有可以按文件名匹配的卡片
  const hasExistingCards = cardStates.some(c => c && c.imageName && c.prompt);
  
  if (hasExistingCards && items.length > 0) {
    // 尝试按文件名匹配
    const matchResult = tryMatchByImageName(items);
    if (matchResult.matched > 0) {
      const msg = `检测到 ${matchResult.matched}/${items.length} 个文件名可匹配。\n\n【确定】按文件名匹配（保持对应关系）\n【取消】按顺序填充（覆盖现有提示词）`;
      if (confirm(msg)) {
        applyMatchResult(items, matchResult.mapping);
        renderCards();
        setStatus(`${matchResult.matched} matched by filename, ${items.length - matchResult.matched} filled in order`, 'ok');
        saveCardsDebounced();
        return;
      }
    }
  }

  // 按顺序填充
  items.forEach((item, i) => {
    if (!cardStates[i]) cardStates[i] = {};
    cardStates[i].prompt    = item.prompt    || '';
    cardStates[i].imageName = item.image_name || `Card ${i}`;
  });
  if (items.length < cardStates.length) cardStates = cardStates.slice(0, items.length);

  renderCards();
  setStatus(`${items.length} prompt(s) split into cards`, 'ok');
  saveCardsDebounced();
});

// 尝试按文件名匹配
function tryMatchByImageName(items) {
  const mapping = []; // [{itemIndex, cardIndex}]
  let matched = 0;
  const usedCards = new Set();

  items.forEach((item, itemIdx) => {
    const imageName = item.image_name;
    if (!imageName) return;
    
    // 在cardStates中查找匹配的imageName
    for (let cardIdx = 0; cardIdx < cardStates.length; cardIdx++) {
      if (usedCards.has(cardIdx)) continue;
      const card = cardStates[cardIdx];
      if (card && card.imageName && card.imageName === imageName) {
        mapping.push({itemIndex: itemIdx, cardIndex: cardIdx});
        usedCards.add(cardIdx);
        matched++;
        break;
      }
    }
  });

  return { mapping, matched };
}

// 应用匹配结果
function applyMatchResult(items, mapping) {
  const newCardStates = [...cardStates];
  
  // 先清空所有prompt
  newCardStates.forEach(c => { if(c) c.prompt = ''; });
  
  // 应用匹配
  mapping.forEach(m => {
    if (!newCardStates[m.cardIndex]) newCardStates[m.cardIndex] = {};
    newCardStates[m.cardIndex].prompt = items[m.itemIndex].prompt || '';
  });
  
  // 未匹配的按顺序填充
  const itemsCopy = [...items];
  mapping.forEach(m => { itemsCopy[m.itemIndex] = null; });
  
  let fillIdx = 0;
  itemsCopy.forEach(item => {
    if (!item) return;
    while (fillIdx < newCardStates.length && newCardStates[fillIdx].prompt) fillIdx++;
    if (fillIdx < newCardStates.length) {
      newCardStates[fillIdx].prompt = item.prompt || '';
      newCardStates[fillIdx].imageName = item.image_name || `Card ${fillIdx}`;
      fillIdx++;
    }
  });
  
  cardStates = newCardStates;
}

// ================================================================
// Render Cards
// ================================================================
function renderCards() {
  const area = $('cards-area');
  area.innerHTML = '';

  if (!currentTaskId) {
    area.appendChild(makeEmptyHint('Select or create a task first'));
    return;
  }

  if (cardStates.length === 0) {
    area.appendChild(makeEmptyHint('Drop images into the batch zone above\nor paste JSON and click Split Prompts'));
    return;
  }

  cardStates.forEach((_, i) => area.appendChild(makeCard(i)));
}

function makeEmptyHint(msg) {
  const div = document.createElement('div');
  div.id = 'empty-hint';
  div.innerHTML = `
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
    <p>${msg.replace(/\n/g,'<br/>')}</p>`;
  return div;
}

function makeCard(i) {
  const s = cardStates[i];
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.index = i;

  card.innerHTML = `
    <div class="card-header">
      <span class="card-num">#${i + 1}</span>
      <span style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
        ${s.imageName || ''}
      </span>
    </div>
    <div class="card-body">

      <!-- img-box-1 -->
      <div class="img-box" id="img-box1-${i}" data-card="${i}">
        ${s.uploadUrl
          ? `<a class="img-link" href="${s.uploadUrl}" target="_blank" rel="noopener">
               <img src="${s.uploadUrl}" alt="source" />
             </a>`
          : `<div class="img-placeholder">
               <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                 <rect x="3" y="3" width="18" height="18" rx="2"/>
                 <circle cx="8.5" cy="8.5" r="1.5"/>
                 <polyline points="21 15 16 10 5 21"/>
               </svg>
               <span>Drop or click</span>
             </div>`
        }
      </div>

      <!-- Generate button -->
      <button class="btn-generate" id="btn-gen-${i}" data-card="${i}">
        <span class="btn-label">Generate</span>
      </button>

      <!-- Prompt textarea -->
      <textarea class="prompt-box" id="prompt-${i}" placeholder="Prompt will appear here...">${s.prompt || ''}</textarea>

      <!-- img-box-2 (result) -->
      <div class="img-box" id="img-box2-${i}" style="border-style:solid;cursor:default;">
        ${s.resultUrl
          ? `<a class="img-link" href="${s.resultUrl}" target="_blank" rel="noopener">
               <img src="${s.resultUrl}" alt="result" />
             </a>`
          : `<div class="img-placeholder">
               <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                 <circle cx="12" cy="12" r="10"/>
                 <line x1="12" y1="8" x2="12" y2="16"/>
                 <line x1="8" y1="12" x2="16" y2="12"/>
               </svg>
               <span>Result</span>
             </div>`
        }
      </div>

      <!-- Result actions -->
      <div class="result-actions">
        <button class="btn-sm" id="btn-dl-${i}"  data-card="${i}">Download</button>
        <button class="btn-sm danger" id="btn-retry-${i}" data-card="${i}">Retry</button>
      </div>

    </div>
  `;

  // Single drop on img-box-1
  const box1 = card.querySelector(`#img-box1-${i}`);
  bindSingleDrop(box1, i);

  // Generate
  card.querySelector(`#btn-gen-${i}`).addEventListener('click', () => generateImage(i));

  // Prompt save on blur
  card.querySelector(`#prompt-${i}`).addEventListener('input', () => {
    cardStates[i].prompt = card.querySelector(`#prompt-${i}`).value;
    saveCardsDebounced();
  });

  // Download
  card.querySelector(`#btn-dl-${i}`).addEventListener('click', () => downloadImage(i));

  // Retry
  card.querySelector(`#btn-retry-${i}`).addEventListener('click', () => generateImage(i));

  // Tooltip hover on both image boxes
  card.querySelectorAll('.img-box img').forEach(img => bindTooltip(img));

  return card;
}

// ================================================================
// Single drop on img-box-1
// ================================================================
function bindSingleDrop(box, idx) {
  box.addEventListener('dragover', e => { e.preventDefault(); box.classList.add('dragover'); });
  box.addEventListener('dragleave', () => box.classList.remove('dragover'));
  box.addEventListener('drop', e => {
    e.preventDefault(); box.classList.remove('dragover');
    const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
    if (files.length) uploadSingleCard(idx, files[0]);
  });
  box.addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*';
    input.onchange = () => { if (input.files[0]) uploadSingleCard(idx, input.files[0]); };
    input.click();
  });
}

async function uploadSingleCard(idx, file) {
  if (!currentTaskId) { setStatus('No task selected', 'err'); return; }

  // Upload to server first
  setStatus('Uploading...', 'busy');
  try {
    const fd = new FormData();
    fd.append('file', file);
    const result = await api('POST', '/api/upload', fd, true);
    const realUrl = '/uploads/' + result.filename;
    cardStates[idx] = cardStates[idx] || {};
    cardStates[idx].uploadUrl = realUrl;
    cardStates[idx].uploadPath = result.path;
    updateImgBox1(idx, realUrl);
    setStatus('Upload complete', 'ok');
    saveCardsDebounced();
  } catch(e) { 
    setStatus('Upload failed: ' + e.message, 'err'); 
  }
}

function updateImgBox1(idx, url) {
  const box = document.getElementById(`img-box1-${idx}`);
  if (!box) return;
  box.innerHTML = `<a class="img-link" href="${url}" target="_blank" rel="noopener">
    <img src="${url}" alt="source" />
  </a>`;
  box.querySelectorAll('img').forEach(img => bindTooltip(img));
}

// ================================================================
// Batch Drop Zone — always visible, auto-creates cards
// ================================================================
const dropZone   = $('drop-zone');
const dropInput  = $('drop-file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
  if (files.length) handleBatchFiles(files);
});
dropZone.addEventListener('click', () => dropInput.click());
dropInput.addEventListener('change', () => {
  const files = [...dropInput.files].filter(f => f.type.startsWith('image/'));
  if (files.length) handleBatchFiles(files);
  dropInput.value = '';
});

async function handleBatchFiles(files) {
  if (!currentTaskId) {
    // Auto-create a task if none selected
    setStatus('Creating task...', 'busy');
    try {
      const task = await api('POST', '/api/tasks', {});
      currentTaskId = task.id;
      cardStates = task.cards || [];
      await loadTaskList();
    } catch(e) { setStatus(e.message, 'err'); return; }
  }

  // Sort by filename
  const sorted = [...files].sort((a, b) => a.name.localeCompare(b.name));

  // 检查是否可以按文件名匹配
  const hasExistingCards = cardStates.some(c => c && c.imageName && c.prompt);
  let useFilenameMatch = false;

  if (hasExistingCards && sorted.length > 0) {
    // 计算匹配数
    let matchCount = 0;
    const usedCards = new Set();
    sorted.forEach(file => {
      for (let i = 0; i < cardStates.length; i++) {
        if (usedCards.has(i)) continue;
        if (cardStates[i] && cardStates[i].imageName === file.name) {
          matchCount++;
          usedCards.add(i);
          break;
        }
      }
    });
    
    if (matchCount > 0) {
      const msg = `检测到 ${matchCount}/${sorted.length} 个文件名可匹配。\n\n【确定】按文件名匹配（保持对应关系）\n【取消】按顺序填充`;
      useFilenameMatch = confirm(msg);
    }
  }

  setStatus(`Uploading ${sorted.length} image(s)...`, 'busy');

  // 上传文件
  const uploadResults = [];
  try {
    for (let i = 0; i < sorted.length; i++) {
      const file = sorted[i];
      const fd = new FormData();
      fd.append('file', file);
      const result = await api('POST', '/api/upload', fd, true);
      uploadResults.push({
        file: file,
        uploadUrl: '/uploads/' + result.filename,
        uploadPath: result.path
      });
    }
  } catch(e) { setStatus('Batch upload failed: ' + e.message, 'err'); return; }

  // 分配到卡片
  if (useFilenameMatch) {
    // 按文件名匹配
    const usedCards = new Set();
    uploadResults.forEach(r => {
      for (let i = 0; i < cardStates.length; i++) {
        if (usedCards.has(i)) continue;
        if (cardStates[i] && cardStates[i].imageName === r.file.name) {
          cardStates[i].uploadUrl = r.uploadUrl;
          cardStates[i].uploadPath = r.uploadPath;
          usedCards.add(i);
          updateImgBox1(i, r.uploadUrl);
          break;
        }
      }
    });
  } else {
    // 按顺序填充
    uploadResults.forEach((r, i) => {
      if (!cardStates[i]) {
        cardStates[i] = { prompt: '', imageName: r.file.name, uploadUrl: '', resultUrl: '' };
      }
      cardStates[i].uploadUrl = r.uploadUrl;
      cardStates[i].uploadPath = r.uploadPath;
      cardStates[i].imageName = cardStates[i].imageName || r.file.name;
      updateImgBox1(i, r.uploadUrl);
    });
  }

  renderCards();
  setStatus(`${sorted.length} image(s) uploaded`, 'ok');
  saveCardsDebounced();
}

// ================================================================
// Generate Image
// ================================================================
async function generateImage(idx) {
  if (!currentTaskId) { setStatus('No task selected', 'err'); return; }

  const prompt = ($(`prompt-${idx}`) || {}).value || cardStates[idx]?.prompt || '';
  if (!prompt.trim()) { setStatus(`Card #${idx+1}: prompt is empty`, 'err'); return; }

  setCardGenerating(idx, true);
  setStatus(`Card #${idx+1}: generating...`, 'busy');

  try {
    const card = cardStates[idx];
    const data = await api('POST', '/api/generate', {
      card_index: idx,
      prompt:     prompt.trim(),
      image_path: card.uploadPath,
      task_id:    currentTaskId,
    });

    const url = data.url || '';
    cardStates[idx].resultUrl = url;
    updateImgBox2(idx, url);
    setStatus(`Card #${idx+1}: done`, 'ok');
    saveCardsDebounced();
  } catch(e) {
    setStatus(`Card #${idx+1} failed: ${e.message}`, 'err');
  } finally {
    setCardGenerating(idx, false);
  }
}

function setCardGenerating(idx, busy) {
  const btn = $(`btn-gen-${idx}`);
  if (!btn) return;
  btn.disabled = busy;
  btn.classList.toggle('loading', busy);
  btn.querySelector('.btn-label').textContent = busy ? 'Generating...' : 'Generate';
}

function updateImgBox2(idx, url) {
  const box = $(`img-box2-${idx}`);
  if (!box) return;
  if (url) {
    box.innerHTML = `<a class="img-link" href="${url}" target="_blank" rel="noopener">
      <img src="${url}" alt="result" />
    </a>`;
    box.querySelectorAll('img').forEach(img => bindTooltip(img));
  } else {
    box.innerHTML = `<div class="img-placeholder">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>Result</span>
    </div>`;
  }
}

// ================================================================
// Download
// ================================================================
function downloadImage(idx) {
  const url = cardStates[idx]?.resultUrl;
  if (!url) { setStatus(`Card #${idx+1}: no result image`, 'err'); return; }
  const a = document.createElement('a');
  a.href = url; a.download = `card${idx+1}_result.png`; a.click();
}

// ================================================================
// Tooltip Preview
// ================================================================
const tooltip    = $('img-tooltip');
const tooltipImg = $('tooltip-img');
let tooltipTimer = null;

function bindTooltip(img) {
  img.addEventListener('mouseenter', () => {
    clearTimeout(tooltipTimer);
    tooltipImg.src = img.src;
    tooltip.classList.add('visible');
  });
  img.addEventListener('mousemove', e => {
    const pad = 16;
    let x = e.clientX + pad;
    let y = e.clientY - 160;
    if (x + 320 > window.innerWidth)  x = e.clientX - 320 - pad;
    if (y < 0) y = 0;
    if (y + 320 > window.innerHeight) y = window.innerHeight - 320;
    tooltip.style.left = x + 'px';
    tooltip.style.top  = y + 'px';
  });
  img.addEventListener('mouseleave', () => {
    tooltipTimer = setTimeout(() => tooltip.classList.remove('visible'), 100);
  });
}

// ================================================================
// Init
// ================================================================
$('btn-new-task').addEventListener('click', createTask);
$('btn-output-folder').addEventListener('click', openOutputFolder);

(async () => {
  const tasks = await api('GET', '/api/tasks').catch(() => []);
  renderSidebar(tasks);

  // Auto-select the last task
  if (tasks.length) {
    const last = tasks[tasks.length - 1];
    const task = await api('GET', `/api/tasks/${last.id}`).catch(()=>null);
    if (task) {
      currentTaskId = task.id;
      cardStates    = task.cards || [];
      $('json-input').value = task.json_input || '';
      renderCards();
      renderSidebar(tasks);
    }
  }
})();
</script>
